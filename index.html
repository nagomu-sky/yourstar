<body>
<div class="stars-bg"></div>
<div class="container">
  <div id="home" class="home-section">
    <h1>3 6 5　日　の　星</h1>
    <div class="subtitle">あなたの星は、誰かが千年前に名付けていた</div>
    <div class="lead">誕生日を選んで、その名に会いにゆく。</div>
    <button class="go go-top" onclick="reveal()">星 を 呼 び 出 す</button>
    <div class="input-group">
      <div class="input-row" id="inputs"></div>
    </div>
    <div class="tabs tabs-bottom">
      <button class="tab active" data-mode="single" onclick="setMode('single')">あなたの星</button>
      <button class="tab" data-mode="compat" onclick="setMode('compat')">二人の相性</button>
    </div>
    <button class="fortune-btn" onclick="showFortune()">今 日 の 運 勢</button>
    <div id="intro-card" class="intro-card">
      <div class="intro-text">
        あなたが生まれた日、夜空には光があった。<br>
        誰がそれを、何と呼んできたか──<br>
        <span class="intro-accent">世界の言葉で、知ることができる。</span>
      </div>
    </div>
  </div>
  <div id="fortune-bg" class="fortune-modal-bg" onclick="if(event.target===this)closeFortune()">
    <div class="fortune-modal">
      <button class="close-x" onclick="closeFortune()">✕</button>
      <div id="fortune-content"></div>
    </div>
  </div>
  <div id="result" class="result"></div>
  <div class="footer">
    <div class="footer-title">365 Days of Stars</div>
    <div class="footer-tagline">あなたの星は、今夜も光っている</div>
    <div class="footer-sub">IAU公認366星 × 世界の語源 × あなたの一夜</div>
  </div>
</div>

ロス」、半人半馬の右肩。\n二つの体を持つ者の肩は、二倍の責任を背負う。","st":"ゴールドシーンオブシディアン","sm":"ケンタウロスの肩にこぼれる、蜜色の温み。"},{"d":110,"n":"Kang","c":"おとめ座","ra":14.2149,"dec":-10.27,"m":4.18,"s":"spring","o":"chinese","w":"懸け橋","msg":"中国の星宿で『龍の首』、おとめ座に重なる古名。\n首は、頭と体を繋ぐ橋。\nどちらが欠けても、橋は意味を失う。","st":"ダトーライト","sm":"龍の首にきらめく、橙に燃える虹の層。"},{"d":111,"n":"Arcturus","c":"うしかい座","ra":14.2611,"dec":19.18,"m":0.16,"s":"spring","o":"greek","w":"流転の旅人","msg":"ひとところに留まらない春の星。変わり続けるのは、強さだ。","st":"タンジェリンクォーツ","sm":"流転の旅人を抱く、時を閉じ込めた橙の樹脂。"},{"d":112,"n":"Syrma","c":"おとめ座","ra":14.2669,"dec":-6.0,"m":4.08,"s":"spring","o":"greek","w":"地に触れて進む裾","msg":"おとめ座、アラビア語で「裾を引きずる者」。地を歩む裾は、土を清めて歩く。","st":"スターサファイア","sm":"衣の裾に流れる、なめらかな白い静けさ。"},{"d":113,"n":"Xuange","c":"うしかい座","ra":14.2731,"dec":46.08,"m":4.18,"s":"spring","o":"chinese","w":"一点に絞る矛先","msg":"うしかい座、中国の単星星宿で「北の長槍」。\nまっすぐ天を指す槍は、迷いを許さない。","st":"オーシャンジャスパー","sm":"天の槍を研ぐ、淡く青ざめた鋭さ。"},{"d":114,"n":"Khambalia","c":"おとめ座","ra":14.3185,"dec":-13.37,"m":4.52,"s":"spring","o":"egyptian","w":"曲がり道の通路","msg":"おとめ座、コプト語で「曲がった爪」、おとめの足の星。\nまっすぐじゃない道のりにも、着く先がある。","st":"ブラックフリント","sm":"曲がった爪に冴えを通す、刃のような青の筋。"},{"d":115,"n":"Kalasungsang","c":"うしかい座","ra":14.5303,"dec":30.37,"m":3.57,"s":"spring","o":"sanskrit","w":"逆さに見る目","msg":"うしかい座、バリ語で「カーラ＝時」「スンサン＝逆さま」。\n時を無駄にするなと告げる古き名。\n逆さまから見ると、世界の形が変わる。","st":"レインボーオブシディアン","sm":"時の番人が握る、光を透かす半透明の黒い雫。"},{"d":116,"n":"Seginus","c":"うしかい座","ra":14.5344,"dec":38.3,"m":3.04,"s":"spring","o":"latin","w":"動かぬ支え","msg":"うしかい座、近代に名づけ直された脚の星。\n動き続ける者を立たせているのは、動かぬ脚のほうだ。","st":"ホワイトアゲート","sm":"立つ脚を支える、やわらかな黄の明かり。"},{"d":117,"n":"Genghe","c":"うしかい座","ra":14.578,"dec":29.73,"m":4.46,"s":"spring","o":"chinese","w":"一番を支える二番目","msg":"うしかい座、中国名で「天の槍」三星のうちの第二星。\n後ろに二番目がいるから、一番は一番でいられる。","st":"ブルーオパール","sm":"天の槍 第二に宿る、橙金にきらめく光の粒。（オレゴン産）"},{"d":118,"n":"Toliman","c":"ケンタウルス座","ra":14.6608,"dec":-60.83,"m":1.35,"s":"spring","o":"arabic","w":"似てくる歩幅","msg":"ケンタウルス座、アラビア語で「ダチョウ二羽」。並んで歩く二人の歩幅は、いつのまにか似てくる。","st":"ブランドバーグクォーツ","sm":"男の足を踏み出させる、黄金に澄んだ温み。"},{"d":119,"n":"Rigil Kentaurus","c":"ケンタウルス座","ra":14.6611,"dec":-60.83,"m":-0.01,"s":"spring","o":"arabic","w":"近くてなお遠い隣人","msg":"ケンタウルス座、アラビア語で「ケンタウロスの足」、太陽系最近の恒星系。\n4.3光年、もっとも近い隣人。\n身近な存在を、当たり前と思うな。","st":"グレーアゲート","sm":"ケンタウロスの足に大地を結ぶ、黄金の確かさ。（ブラジル産）"},{"d":120,"n":"Uridim","c":"おおかみ座","ra":14.6986,"dec":-47.38,"m":2.29,"s":"spring","o":"sumerian","w":"野のままの力","msg":"シュメール語で「野の主・狼」。\n人類最古の文明が、野生の力に名を与えた星。\n飼い慣らされないことを、罪にしてはいけない。","st":"ブラックアゲート","sm":"野の番人の眼に冴える、澄んだ青のまなざし。"},{"d":121,"n":"Xami","c":"コンパス座","ra":14.7083,"dec":-64.97,"m":3.16,"s":"spring","o":"african","w":"見えにくいものを見る目","msg":"コンパス座、南アフリカの星座で「ライオンの顔」。\nアルファ・ベータケンタウリの目に挟まれた、見えない顔。\n見えないものを見る目を、信じよ。","st":"アレキサンドライト","sm":"獅子の顔に澄みわたる、明るい黄の透明。"},{"d":122,"n":"Alrumh","c":"うしかい座","ra":14.7237,"dec":26.52,"m":4.8,"s":"spring","o":"arabic","w":"線を引く者","msg":"うしかい座、アラビア語で「槍・矛」、四つの星を結ぶ古代アラブの星宿。\n振り上げる前の槍は、ただの棒。\n振り上げた瞬間に、意味が宿る。","st":"ピンクムーンストーン","sm":"槍の穂先に灯る、橙赤にともる小さな火。"},{"d":123,"n":"Izar","c":"うしかい座","ra":14.7497,"dec":27.07,"m":2.46,"s":"spring","o":"arabic","w":"まとうものの姿","msg":"うしかい座、アラビア語で「腰の帯」。まとうものは、その人の姿勢を作る。","st":"ゴッシェナイト","sm":"腰布にやわらかく寄り添う、橙桃の月光。"},{"d":124,"n":"Maenalus","c":"おとめ座","ra":14.7706,"dec":1.88,"m":3.72,"s":"spring","o":"latin","w":"空に写した地の名","msg":"おとめ座、ギリシャ・ペロポネソス半島の山に捧げられた星。\n地上の場所を、空に映す試みもある。","st":"ブラウンアゲート","sm":"メーナロスの山肌を照らす、穏やかな黄の翠。"},{"d":125,"n":"Paradys","c":"ふうちょう座","ra":14.7975,"dec":-79.03,"m":3.81,"s":"spring","o":"contemporary","w":"想像が宿る鳥","msg":"ふうちょう座、1598年プランキウスが付けた「極楽鳥」の名。\n見たことがないものの名は、想像が宿る。","st":"オレンジアゲート","sm":"極楽鳥の羽にうつろう、橙に燃える層の虹。"},{"d":126,"n":"Solitaire","c":"うみへび座","ra":14.8381,"dec":-27.95,"m":4.42,"s":"spring","o":"contemporary","w":"消えた者の居場所","msg":"うみへび座、絶滅したロドリゲス・ソリテア鳥に捧げられた星。\n失われたものを、夜空に残す優しさがある。","st":"ピンクトパーズ","sm":"孤独な鳥の胸に灯る、白にひそむ淡い遊色。"},{"d":127,"n":"Kochab","c":"こぐま座","ra":14.845,"dec":74.15,"m":2.06,"s":"spring","o":"arabic","w":"動く中心","msg":"こぐま座、紀元前3000年頃の北極星、アラビア語に由来。\n中心は時代と共に動く。\n動かないように見えて、動いている。","st":"バンデッドアゲート","sm":"北を守る灯、橙に深く澄んだ蜜の石。"},{"d":128,"n":"Zubenelgenubi","c":"てんびん座","ra":14.8478,"dec":-16.03,"m":2.73,"s":"spring","o":"arabic","w":"両側を知る者","msg":"てんびん座、アラビア語で「南の爪」。元はさそりの爪だった星。境界に立つ者は、両側の景色を知っている。","st":"レインボームーンストーン","sm":"南の爪をなだめる、淡い青の縞の波。"},{"d":129,"n":"Nekkar","c":"うしかい座","ra":15.0322,"dec":40.38,"m":3.48,"s":"spring","o":"arabic","w":"地に近い輝き","msg":"うしかい座、アラビア語で「牛使いの頭」。頭で考える者は、足で稼ぐ者にいつか追いつかれる。","st":"ラルビカイト","sm":"うしかいの頭に冴える、淡く澄んだ黄の透明。"},{"d":130,"n":"Quadrans","c":"うしかい座","ra":15.0631,"dec":47.65,"m":4.7,"s":"spring","o":"latin","w":"名残","msg":"うしかい座、ラテン語で「四分儀」、1795年命名の廃止された星座。\n失われた星座にも、流星群の名前として残った。\n消えても、痕跡を残せ。","st":"ヒマラヤクォーツ","sm":"四分儀の刻みに通る、まっすぐ澄んだ白の像。"},{"d":131,"n":"Brachium","c":"てんびん座","ra":15.0678,"dec":-25.27,"m":3.28,"s":"spring","o":"latin","w":"外へひらく光","msg":"てんびん座、ラテン語で「腕」。\n振り上げる腕より、差し伸べる腕が美しい。","st":"ハイアライト","sm":"差し伸べる腕に灯る、深紅の奥で光の十字を結ぶ石。"},{"d":132,"n":"Qigong","c":"うしかい座","ra":15.2583,"dec":33.3,"m":3.46,"s":"spring","o":"chinese","w":"揺るがぬ七つの合議","msg":"うしかい座、中国名で「七人の高位者」。\n七人の合議は、一人の決断より遅いが、揺るがない。","st":"カシテライト","sm":"七公の座に散る、橙金にきらめく光の粒。（インド産）"},{"d":133,"n":"Zubeneschamali","c":"てんびん座","ra":15.2833,"dec":-9.37,"m":2.61,"s":"spring","o":"arabic","w":"釣り合いの片端","msg":"てんびん座、アラビア語で「北の爪」。秤を保つには、両側に同じ重みがいる。","st":"アイアゲート","sm":"北の爪に澄みわたる、青緑のおだやかな光。"},{"d":134,"n":"Pherkad","c":"こぐま座","ra":15.3453,"dec":71.83,"m":3.03,"s":"spring","o":"arabic","w":"小さき道標","msg":"こぐま座、アラビア語で「子牛」。小さき者にも、北を指す役目がある。","st":"トルマリンクォーツ","sm":"北を指す子に添う、混じりけない白の落ち着き。"},{"d":135,"n":"Alkalurops","c":"うしかい座","ra":15.4082,"dec":37.37,"m":4.31,"s":"spring","o":"latin","w":"地に突く一本","msg":"うしかい座、ギリシャ語で「羊飼いの杖」。振りかぶる前に、地に突くものを持て。","st":"ジャスパー","sm":"牧人の杖に芯を通す、黄褐に締まる大地の石。"},{"d":136,"n":"Edasich","c":"りゅう座","ra":15.4153,"dec":58.95,"m":3.3,"s":"spring","o":"arabic","w":"小さな世界の中心","msg":"りゅう座、アラビア語で「ハイエナ」。華やかでなくても、君を真ん中に回る世界が、どこかにある。","st":"ジルコン","sm":"ひとつの太陽として灯る、橙にあたたかな光。"},{"d":137,"n":"Nusakan","c":"かんむり座","ra":15.4636,"dec":29.1,"m":3.64,"s":"spring","o":"arabic","w":"重なって生まれる光","msg":"かんむり座、アラビア語で「二列の星々」、 かを守る役目に、誇りを持っていい。","st":"モリオン","sm":"守る役目を負う者に添う、深く艶めく漆黒の盾。"},{"d":176,"n":"Bake-eo","c":"へびつかい座","ra":17.7981,"dec":2.7,"m":3.73,"s":"summer","o":"marshallese","w":"呼ばれて在るもの","msg":"へびつかい座、マーシャル諸島語で「ここに貝あり」。\n声に出して名を呼ぶことで、その存在は確かになる。","st":"プリズムアゲート","sm":"貝殻のようになめらかな、白くやわらぐ静けさ。"},{"d":177,"n":"Fuyue","c":"さそり座","ra":17.8308,"dec":-37.03,"m":3.19,"s":"summer","o":"chinese","w":"諫める一人","msg":"さそり座、紀元前18世紀の中国の伝説の宰相、過誤を告げる役。\n王に「違う」と言える臣下は、王より長く名が残る。","st":"ウォーターオパール","sm":"賢臣の座に積もる、時を抱いた橙の樹脂。"},{"d":178,"n":"Grumium","c":"りゅう座","ra":17.8919,"dec":56.87,"m":3.73,"s":"summer","o":"latin","w":"噛みしめる力点","msg":"りゅう座、ラテン語で「顎」。噛みしめる時が、いちばん力が出る。","st":"ゲーサイト","sm":"竜の顎に噛みしめる、橙赤に燃える石の粒。"},{"d":179,"n":"Eltanin","c":"りゅう座","ra":17.9433,"dec":51.48,"m":2.23,"s":"summer","o":"arabic","w":"天と地を結ぶしるべ","msg":"りゅう座、アラビア語で「蛇」、りゅう座そのものの名。\n蛇は、地と空を繋ぐ生き物。\n天を見上げることで、人は自分の立つ場所を知る。","st":"ホワイトカルセドニー","sm":"蛇の首にとぐろを巻く、褐をおびた深い赤。"},{"d":180,"n":"Alnasl","c":"いて座","ra":18.0967,"dec":-30.42,"m":2.96,"s":"summer","o":"arabic","w":"行き先を指す先端","msg":"いて座、アラビア語で「矢の先端」。\n放たれた矢の先には、決めた行き先がある。","st":"シーライト","sm":"矢の先にやわらかく宿る、橙桃の月の光。"},{"d":181,"n":"Ramus","c":"ヘルクレス座","ra":18.146,"dec":20.8,"m":4.37,"s":"summer","o":"latin","w":"実りをつけた枝","msg":"ヘルクレス座、ラテン語で「枝」、黄金のリンゴの枝。\n枝の先には、いつも何か実っている。","st":"スターガーネット","sm":"黄金の枝に流れる、金に澄みわたる温み。"},{"d":182,"n":"Polis","c":"いて座","ra":18.2292,"dec":-21.05,"m":3.84,"s":"summer","o":"greek","w":"寄り集まる中心","msg":"いて座、ギリシャ語で「都市」。集まりの中心にいる者は、孤独を選ばない。","st":"モハベブルーカルセドニー","sm":"都市の灯をつなぐ、青緑にひろがる静けさ。"},{"d":183,"n":"Kaus Media","c":"いて座","ra":18.3497,"dec":-29.82,"m":2.68,"s":"summer","o":"arabic","w":"両端を受ける者","msg":"いて座の弓の真ん中、力の集まる点。バランスとは、両端を見ながら立つこと。","st":"ベリル","sm":"弓の中央に集まる力を、深紅に走る六条の光で。"},{"d":184,"n":"Tusizuo","c":"ヘルクレス座","ra":18.395,"dec":21.77,"m":3.85,"s":"summer","o":"chinese","w":"区切りをつける場","msg":"ヘルクレス座、漢代の中国の二星星宿で「屠殺場」。\n人生の節目には、立ち止まっていい場所がある。","st":"リビアングラス","sm":"節目の場に据わる、暗く澄んだ赤の重み。"},{"d":185,"n":"Kaus Australis","c":"いて座","ra":18.4028,"dec":-34.38,"m":1.81,"s":"summer","o":"arabic","w":"引き絞る間","msg":"いて座の弓の下端。射る前に、引く時間がいちばん大事。","st":"ハニーオパール","sm":"南の弓のしなりに宿る、空色をおびた青緑の張り。"},{"d":186,"n":"Kaus Borealis","c":"いて座","ra":18.4661,"dec":-25.42,"m":2.81,"s":"summer","o":"arabic","w":"定まった向き","msg":"いて座の弓の上端、放つ前の張り。方向が定まれば、矢は放たれる前に届く。","st":"スモーキークォーツ","sm":"北へ引かれる弓に、赤褐に黒を流す石の張り。"},{"d":187,"n":"Vega","c":"こと座","ra":18.6156,"dec":38.77,"m":0.03,"s":"summer","o":"arabic","w":"紡ぎ続ける糸","msg":"七夕の織姫。途中で投げ出さずに紡げ、その糸はやがて空を渡る。","st":"インペリアルトパーズ","sm":"織り続ける手に、澄んだ青のひとすじを通す。"},{"d":188,"n":"Sheliak","c":"こと座","ra":18.8344,"dec":33.35,"m":3.63,"s":"summer","o":"arabic","w":"あいだの空白","msg":"こと座、アラビア語で「亀の甲羅」、もとはハープの胴。音を響かせるのは、空洞の部分。","st":"ブラックオパール","sm":"弦を支える橋に添う、青みをおびた緑の落ち着き。"},{"d":189,"n":"Nunki","c":"いて座","ra":18.9208,"dec":-26.28,"m":2.07,"s":"summer","o":"sumerian","w":"放つ手のひとつ","msg":"いて座の手の中の星、シュメール語に由来。蓄えてきたものを、出すべき時に出せるか。","st":"バンデッドオニキス","sm":"ためられた力を、青緑にしずまる静かな石へ。"},{"d":190,"n":"Alya","c":"へび座","ra":18.9369,"dec":4.2,"m":4.58,"s":"summer","o":"arabic","w":"思いがけない縁","msg":"へび座、アラビア語で「東洋種の羊の太い脂尾」。\n誤って Alioth の語源とされた、紛らわしい名。\n誤読は、新しい意味の入り口。","st":"プラシオライト","sm":"脂をふくむ尾の白さに、乳白のやわらかさを重ねて。"},{"d":191,"n":"Sulafat","c":"こと座","ra":18.9822,"dec":32.68,"m":3.22,"s":"summer","o":"arabic","w":"殻の奥で鳴る音","msg":"こと座、アラビア語で「亀」、リラの胴体になぞらえた名。\n亀の甲羅が、音を響かせる楽器になった。\n硬い殻にも、音楽が宿る。","st":"レッドオニキス","sm":"硬い甲羅にひそむ音色のような、やわらかな青緑。"},{"d":192,"n":"Ascella","c":"いて座","ra":19.0433,"dec":-29.87,"m":2.61,"s":"summer","o":"latin","w":"たわむ柔らかさ","msg":"いて座、ラテン語で「脇」。脇は、力の入らない場所だからこそ、しなやかでいられる。","st":"レモンクリソプレーズ","sm":"体を支える脇腹に、白い網目の静けさを宿す。"},{"d":193,"n":"Okab","c":"わし座","ra":19.09,"dec":13.85,"m":2.95,"s":"summer","o":"arabic","w":"向きを決める一動き","msg":"わし座、アラビア語で「鷲の尾」、本来は ζ-ε Aql の名。\n尾は、方向を決める舵。\n進路を決めるのは、翼ではなく、尾のひと動きだ。","st":"イネサイト","sm":"鷲の尾の白に、なめらかな翡翠の艶を添える。"},{"d":194,"n":"Meridiana","c":"みなみのかんむり座","ra":19.1579,"dec":-37.9,"m":4.09,"s":"summer","o":"latin","w":"低きからの冠","msg":"みなみのかんむり座、ラテン＋アラビア語で「南の宝石冠」。\n南の冠は、北の冠より低く輝く。\n低い場所からの視点を、忘れるな。","st":"ベリロナイト","sm":"真昼の冠を、光をまっすぐ通す無色の石で。"},{"d":195,"n":"Albaldah","c":"いて座","ra":19.1625,"dec":-21.02,"m":2.9,"s":"summer","o":"arabic","w":"名づけられた余白","msg":"いて座、アラビア語で「空地」、星のない領域の名。\n何もない場所にも、名前がある。\n空白は、誰かに埋められるのを待っている。","st":"エピドートクォーツ","sm":"空き地に降る陽だまりのような、淡い黄の石。"},{"d":196,"n":"Altais","c":"りゅう座","ra":19.2092,"dec":67.65,"m":3.06,"s":"summer","o":"arabic","w":"生み出す力","msg":"りゅう座、アラビア語の「蛇」を誤読した名前。\n誤読が、新しい星の名前を生むこともある。","st":"デンドリティックアゲート","sm":"誤読の蛇の中を、金の針が一本きらめいて走る。"},{"d":197,"n":"Aladfar","c":"こと座","ra":19.2293,"dec":39.13,"m":4.43,"s":"summer","o":"arabic","w":"見ようとした者に現れる","msg":"こと座、アラビア語で「急降下する鷲の爪」、こと座の二星の名。\n爪は、掴む瞬間にしか開かない。","st":"ペリステライト","sm":"鷲の爪に、研がれた青のひとすじを宿す石。"},{"d":198,"n":"Arkab Prior","c":"いて座","ra":19.3772,"dec":-44.45,"m":3.94,"s":"summer","o":"arabic","w":"見えない継ぎ目","msg":"いて座、アラビア語で「射手のアキレス腱・前」。\n見えない場所の腱が、すべての動きを支える。","st":"コンドルアゲート","sm":"射手の腱を張る、淡く澄んだ青に揺れる遊色。"},{"d":199,"n":"Arkab Posterior","c":"いて座","ra":19.387,"dec":-44.78,"m":4.29,"s":"summer","o":"arabic","w":"張り合う緊張","msg":"いて座、アラビア語で「射手のアキレス腱・後」。\n弓を引く力は、二本の腱が逆に働いて生まれる。","st":"レッドアベンチュリン","sm":"後ろに控える腱へ、ひかりを溜めた淡い橙金。"},{"d":200,"n":"Rukbat","c":"いて座","ra":19.3981,"dec":-40.6,"m":3.94,"s":"summer","o":"arabic","w":"引き絞り","msg":"いて座、アラビア語で『射手の膝』。\n射る前に、止まる時間がある。","st":"プラズマ","sm":"射手の膝に、青い月光の冴えをそっと置く。"},{"d":201,"n":"Anser","c":"こぎつね座","ra":19.4784,"dec":24.65,"m":4.4,"s":"summer","o":"latin","w":"隅にいない者","msg":"こぎつね座、ラテン語で「鵞鳥」、ヘヴェリウスが「鵞鳥を抱えた小狐」と名付けた星座から。\n小さな存在だからと、隅に置かれる理由はない。","st":"ヘマタイトクォーツ","sm":"鵞鳥の体温を、赤くあたたかな大地の石に。"},{"d":202,"n":"Albireo","c":"はくちょう座","ra":19.5119,"dec":27.95,"m":3.07,"s":"summer","o":"arabic","w":"寄り添う対の色","msg":"はくちょう座のくちばし、青と金の二重星で名高い。相反する色も、寄り添えば調和する。","st":"ブラックカイヤナイト","sm":"くちばしに寄り添う、淡く澄んだ薄桃の調和。"},{"d":203,"n":"Alsafi","c":"りゅう座","ra":19.5393,"dec":69.65,"m":4.674,"s":"summer","o":"arabic","w":"三つでひとつ","msg":"りゅう座、アラビア語で「竈の三脚」、遊牧民の野外調理具。\n三本の脚は、一本でも欠けたら立たない。","st":"ブレシエイテッドジャスパー","sm":"三本の脚を支える、赤と黄に焼けた大地の縞。"},{"d":204,"n":"Sham","c":"や座","ra":19.6683,"dec":18.0,"m":4.38,"s":"summer","o":"arabic","w":"引き返さぬ一直線","msg":"や座、アラビア語で「矢」。放たれた矢は、軌道を変えない。決めたら、戻らないでいい。","st":"グリーンデマントイド","sm":"放たれた矢に、まっすぐ通る金褐の透明な光。"},{"d":205,"n":"Fawaris","c":"はくちょう座","ra":19.7494,"dec":45.12,"m":2.91,"s":"summer","o":"arabic","w":"群れを背負う名","msg":"はくちょう座、アラビア語で「騎士たち」、四つの星を結ぶ星宿の代表。\n一人の騎士の名が、群れ全体を表す。","st":"インディゴガブロ","sm":"馬を駆る騎士たちに、深く澄んだ青のひとすじ。"},{"d":206,"n":"Tarazed","c":"わし座","ra":19.7708,"dec":10.6,"m":2.69,"s":"summer","o":"persian","w":"量りつつ量られる","msg":"わし座、ペルシア語で「秤」。量る者は、量られる側に立つ覚悟も持つ。","st":"アイリスクォーツ","sm":"天秤に灯る星を、深い赤にきらめく粒で。"},{"d":207,"n":"Altair","c":"わし座","ra":19.8461,"dec":8.87,"m":0.93,"s":"summer","o":"arabic","w":"全体の構図","msg":"夏の大三角の一角、七夕の彦星。細部より、構図を見よ。","st":"クリソベリルキャッツアイ","sm":"翔ける鷲に、何にも濁らぬ無色の透明を宿す。"},{"d":208,"n":"Libertas","c":"わし座","ra":19.9041,"dec":8.45,"m":4.722,"s":"summer","o":"latin","w":"空に刻んだ祈り","msg":"わし座、ラテン語で「自由」。\n自由を奪われた人々を忘れないために、空に刻まれた星。","st":"ジェレメジェバイト","sm":"自由を、軽やかに澄んだ黄の結晶で。"},{"d":209,"n":"Alshain","c":"わし座","ra":19.9217,"dec":6.4,"m":3.72,"s":"summer","o":"persian","w":"水平を渡す支点","msg":"わし座、ペルシア語で「秤の梁」、α・β・γ Aqlの古い名。\n梁が水平でなければ、秤は機能しない。\n水平を保つことが、いちばん難しい。","st":"レインフォレストジャスパー","sm":"天秤の梁に、ゆれずに灯る金色の重み。"},{"d":210,"n":"Terebellum","c":"いて座","ra":19.9307,"dec":-26.28,"m":4.7,"s":"summer","o":"latin","w":"四つそろう形","msg":"いて座、ラテン語で「四つ角」。四つの星が並んで、一つの形をつくる。","st":"ブルズアイアゲート","sm":"四つ星が結ぶ形に、樹液が固まった黄金の透明。"},{"d":211,"n":"Antinous","c":"わし座","ra":20.1883,"dec":-0.82,"m":3.25,"s":"summer","o":"greek","w":"千年残る名","msg":"わし座、プトレマイオスが137年に作った副星座、ハドリアヌスの愛人の名。\n愛された者の名が、千年後も星に残る。","st":"オーラライト23","sm":"愛された者に、淡く揺れる青の遊色を添えて。"},{"d":212,"n":"Algedi","c":"やぎ座","ra":20.3008,"dec":-12.53,"m":3.58,"s":"summer","o":"arabic","w":"形が決める要","msg":"やぎ座、アラビア語で「子山羊」、やぎ座そのものの名。\n小さき者が、星座の名になる。\n大きさじゃない、形が大事。","st":"パライバトルマリン","sm":"山羊の頭に、小さく澄んだ金褐の艶を宿す。"},{"d":213,"n":"Alshat","c":"やぎ座","ra":20.3444,"dec":-12.75,"m":4.76,"s":"summer","o":"arabic","w":"祝福を添えられた名","msg":"やぎ座、アラビア語の「祝祭で捧げられる」星宿の星。\n犠牲を意味する名にも、幸運の文字が添えられる。","st":"スモーキーシトリン","sm":"捧げられた羊に宿る、白い石の中に枝分かれするしるし。"},{"d":214,"n":"Dabih","c":"やぎ座","ra":20.35,"dec":-14.77,"m":3.07,"s":"summer","o":"arabic","w":"場を整える者","msg":"やぎ座、アラビア語で「祝祭を司る者」。場を整える者がいるから、儀式は祈りになる。","st":"パイロクスマンガイト","sm":"祭儀の主に、赤褐に流れる縞の輝きを。"},{"d":215,"n":"Sadr","c":"はくちょう座","ra":20.3703,"dec":40.25,"m":2.2,"s":"summer","o":"arabic","w":"立ち戻る中心","msg":"はくちょう座、アラビア語で「胸」、はくちょう座の中心。胸の中の音を聞く時間を、毎日持て。","st":"プレナイトキャッツアイ","sm":"白鳥の胸の鼓動にこたえる、金属質に輝く灰の対。"},{"d":216,"n":"Peacock","c":"くじゃく座","ra":20.4272,"dec":-56.73,"m":1.92,"s":"summer","o":"english","w":"見られて立つ覚悟","msg":"くじゃく座の翼、孔雀の羽の眼。見られている前提で動けるのは、覚悟だ。","st":"インペリアルジャスパー","sm":"千の眼に、深く濃い藍の輝きを散りばめて。"},{"d":217,"n":"Aldulfin","c":"いるか座","ra":20.5535,"dec":11.3,"m":4.03,"s":"summer","o":"arabic","w":"微笑みの奥の知恵","msg":"いるか座、アラビア語で「イルカ」、ギリシャ語からの借用。\nイルカは、笑っているように見える知恵者。","st":"ブルーサファイア","sm":"イルカの背鰭に、波をくぐる淡い青を宿す。"},{"d":218,"n":"Rotanev","c":"いるか座","ra":20.6256,"dec":14.58,"m":3.63,"s":"summer","o":"latin","w":"必然と偶然","msg":"いるか座、近代逆さ綴りの命名（学者Venator）。引っくり返した名前でも、千年、星の名として通用する。","st":"テクタイト","sm":"逆さに綴られた名へ、澄んだ黄のしるしを。"},{"d":219,"n":"Sualocin","c":"いるか座","ra":20.6606,"dec":15.9,"m":3.78,"s":"summer","o":"latin","w":"ひそかに残る","msg":"いるか座、19世紀の天文学者ニコラウスの名前を逆さ綴り。名前は遊びの中にも宿る。","st":"ブルージルコン","sm":"学者の影に、やわらかく濁る黄緑の灯を。"},{"d":220,"n":"Deneb","c":"はくちょう座","ra":20.6903,"dec":45.27,"m":1.33,"s":"summer","o":"arabic","w":"遠くまで届く声","msg":"はるか1500光年からの光、はくちょう座の尾。君の声は、思っているより遠くまで届く。","st":"カテドラルクォーツ","sm":"夏の尾翼に、深く荘厳な群青を載せる（アフガニスタン産）。"},{"d":221,"n":"Aljanah","c":"はくちょう座","ra":20.77,"dec":33.97,"m":2.46,"s":"summer","o":"arabic","w":"畳む時を知る翼","msg":"はくちょう座、アラビア語で「翼」、白鳥の翼の星。\n翼を持つ者は、翼を畳む時を知る。","st":"オウルアイジャスパー","sm":"白鳥の翼を畳む夕、褐をおびた深い赤に沈む。"},{"d":222,"n":"Albali","c":"みずがめ座","ra":20.7944,"dec":-9.48,"m":3.76,"s":"summer","o":"arabic","w":"飲み込む者","msg":"みずがめ座、アラビア語で「飲み込む者」。受け入れる力は、押し返す力より強い。","st":"イエロースミソナイト","sm":"飲み込む者に、透きとおる青の結晶を授ける。"},{"d":223,"n":"Udang","c":"やぎ座","ra":21.0991,"dec":-17.22,"m":4.07,"s":"summer","o":"balinese","w":"横へ逃げる身のこなし","msg":"やぎ座、バリ語で「海老」、1300年続くバリの星暦に由来。\n海老は、後ろ向きにも器用に進む。\n前に進めない時は、横に進めばいい。","st":"ブラウンジャスパー","sm":"海老の節をなぞる、樹脂が固めた黄褐の透明。"},{"d":224,"n":"Kitalpha","c":"こうま座","ra":21.2636,"dec":5.23,"m":3.94,"s":"summer","o":"arabic","w":"半身に宿る一頭","msg":"こうま座、アラビア語で「馬の一部」、こうま座そのもの。\n半分しか描かれない馬にも、走る姿がある。","st":"ピーチオブシディアン","sm":"半身だけの馬へ、澄んだ黄水晶のひかりを。"},{"d":225,"n":"Alderamin","c":"ケフェウス座","ra":21.3094,"dec":62.58,"m":2.47,"s":"summer","o":"arabic","w":"語り継がれた意味","msg":"ケフェウス座、アラビア語で「右腕」と理解されてきた古名。\n名前の由来が誤解だとしても、その意味は生き続ける。","st":"ツァボライトガーネット","sm":"王の右腕に宿る、白い地に虹色の閃き。"},{"d":226,"n":"Alfirk","c":"ケフェウス座","ra":21.4775,"dec":70.55,"m":3.23,"s":"summer","o":"arabic","w":"群れのなかの固有の光","msg":"ケフェウス座、アラビア語で「群れ」。群れの中で、誰とも違う光になれ。","st":"ハイアライトオパール","sm":"群れをなす者へ、青のこまかなきらめきを。"},{"d":227,"n":"Sadalsuud","c":"みずがめ座","ra":21.5258,"dec":-5.57,"m":2.89,"s":"summer","o":"arabic","w":"二重の吉兆","msg":"みずがめ座、アラビア語で「最幸運」。二重に幸運な日もある。素直に受け取れ。","st":"デンドリティッククォーツ","sm":"二重の幸運を閉じこめた、青く澄む稀少な琥珀。"},{"d":228,"n":"Bunda","c":"みずがめ座","ra":21.6292,"dec":-7.85,"m":4.69,"s":"summer","o":"persian","w":"読み方の数だけある夜空","msg":"みずがめ座、ペルシア語の月宿名。\n暦が違えば、同じ夜空も違って見える。どちらも正しい。","st":"レーザークォーツ","sm":"古い月宿の名に、艶やかに黒く伸びる結晶の柱。"},{"d":229,"n":"Nashira","c":"やぎ座","ra":21.6681,"dec":-16.65,"m":3.68,"s":"summer","o":"arabic","w":"運ばれてくる吉報","msg":"やぎ座、アラビア語で「幸運をもたらす者」。良い知らせは、夜空からも降ってくる。","st":"グリーンオニキス","sm":"幸運の知らせを夜から運ぶ、艶やかに深い守りの黒。"},{"d":230,"n":"Azelfafage","c":"はくちょう座","ra":21.7016,"dec":51.18,"m":4.66,"s":"summer","o":"arabic","w":"地続きの蹄と翼","msg":"はくちょう座、アラビア語に由来。地を蹴る力は、空を翔ぶ翼と同じだ。","st":"プルプライト","sm":"馬の蹄に、淡く青緑にひらける静けさを。"},{"d":231,"n":"Garnet Star","c":"ケフェウス座","ra":21.7251,"dec":58.77,"m":4.08,"s":"summer","o":"english","w":"ありのままでいい","msg":"ケフェウス座、ハーシェルが「深いガーネット色」と記述、ピアッツィが命名。\n色そのものが、星の名前になることもある。","st":"グリーンジャスパー","sm":"深紅の星に、燃える血の色のガーネットを。"},{"d":232,"n":"Enif","c":"ペガスス座","ra":21.7364,"dec":9.87,"m":2.39,"s":"summer","o":"arabic","w":"先に気づく場所","msg":"ペガスス座、アラビア語で「鼻」、ペガサスの口元の星。\n馬の鼻は、空気を読む器官。\n誰よりも先に、変化に気づく場所。","st":"グレームーンストーン","sm":"馬の鼻先に、緑と褐の円が浮かぶ大地の石。"},{"d":233,"n":"Deneb Algedi","c":"やぎ座","ra":21.7839,"dec":-16.12,"m":2.85,"s":"summer","o":"arabic","w":"いちばん遠くへの合図","msg":"やぎ座、アラビア語で『山羊の尾』。\n尾は、群れの中で振られる旗。\n尾のひと振りは、言葉より早く、気持ちを伝える。","st":"エレスチャルクォーツ","sm":"山羊の尾に、両端がとがる無色の輝きを。"},{"d":234,"n":"Aldhanab","c":"つる座","ra":21.8986,"dec":-37.35,"m":2.98,"s":"summer","o":"arabic","w":"端を整えるもの","msg":"つる座、アラビア語で『尾』、鶴のしっぽに当たる星。\n飛ぶ鳥の尾は、舵の役割。\n美しさは、いちばん端の、尾の先に出る。","st":"ガーデンクォーツ","sm":"鶴の尾が空へ流す、淡くにごる青緑の筋。"},{"d":235,"n":"Kurhah","c":"ケフェウス座","ra":22.0632,"dec":64.62,"m":4.45,"s":"summer","o":"arabic","w":"見分けるしるし","msg":"ケフェウス座、アラビア語で「馬の額の白い斑点」。\n額の印は、その馬を遠くからでも見分けさせる。","st":"デュモルチクォーツ","sm":"額に灯る白い星へ、ほのかな遊色のひかりを。"},{"d":236,"n":"Sadalmelik","c":"みずがめ座","ra":22.0964,"dec":-0.32,"m":2.93,"s":"summer","o":"arabic","w":"高みから流れる運","msg":"みずがめ座、アラビア語で「王者の幸運」。いちばん上に立つ者の運は、いちばん下まで届く。","st":"スカイアイジャスパー","sm":"王の幸運に、金褐の縞が放つ眼差しを宿す。"},{"d":237,"n":"Alnair","c":"つる座","ra":22.1369,"dec":-46.95,"m":1.77,"s":"summer","o":"arabic","w":"重さを振り切る翼","msg":"南の鶴座の翼の先、アラビア語で「明るい者」。飛ぶには、まず重さを捨てる勇気が要る。","st":"ヘデンベルグクォーツ","sm":"翔ぶ翼に添う、空と海をとかした青緑の石。"},{"d":238,"n":"Biham","c":"ペガスス座","ra":22.1697,"dec":6.18,"m":3.53,"s":"summer","o":"arabic","w":"守られる小ささ","msg":"ペガスス座、アラビア語で「子羊・子山羊・子牛の幸運の星」。\n小さな命を見守る星にも、幸運の名が宿る。","st":"デンドリティックオパール","sm":"子らの幸運を見守る、若葉のように澄んだ緑。"},{"d":239,"n":"Ancha","c":"みずがめ座","ra":22.2806,"dec":-7.77,"m":4.175,"s":"summer","o":"latin","w":"上も下も支える境目","msg":"みずがめ座、ラテン語で「腰」。\n腰は、上半身と下半身の境目。\n腰は、上と下の両方を支える。どちらも、君の一部だ。","st":"レッドベリル","sm":"境目の腰を支える、深紅に走る六条の光。"},{"d":240,"n":"Lang-exster","c":"きょしちょう座","ra":22.3083,"dec":-60.25,"m":2.85,"s":"summer","o":"contemporary","w":"文化の出会う地点","msg":"きょしちょう座、マレー語＋オランダ語で二種の鳥の合成名。\n異なる文化が一つの星に名をつける、その出会いを尊べ。","st":"フォレストジャスパー","sm":"異なる二羽の出会いに宿る、みずみずしい黄緑の冴え。"},{"d":241,"n":"Sadachbia","c":"みずがめ座","ra":22.3608,"dec":-1.38,"m":3.85,"s":"summer","o":"arabic","w":"運を育てる屋根","msg":"みずがめ座、アラビア語で「天幕の幸運」。屋根の下にいる時間は、運が育つ時間。","st":"イエロージャスパー","sm":"幸運の天幕に、淡くきらめく緑の砂金を敷く。"},{"d":242,"n":"Taika","c":"とかげ座","ra":22.3675,"dec":45.45,"m":3.0,"s":"summer","o":"baltic","w":"託された願い","msg":"とかげ座、リトアニア語で「平和」。\n平和は、それを願う人がいる限り、星に名を残す。","st":"セランダイト","sm":"平和という名にともる、赤褐と黒の溶けあう静かな艶。"},{"d":243,"n":"Stellio","c":"とかげ座","ra":22.5214,"dec":50.27,"m":3.78,"s":"summer","o":"latin","w":"待つことも一手","msg":"とかげ座、ラテン語で「トカゲ」、ヘヴェリウスが付けた別名。\n動かずに待つのも、狩りのうちだ。","st":"レインボーフローライト","sm":"トカゲの肌に、白に斑をちらした石を重ねて。"},{"d":244,"n":"Homam","c":"ペガスス座","ra":22.6908,"dec":10.82,"m":3.42,"s":"summer","o":"arabic","w":"運を迎えに行く者","msg":"ペガスス座、アラビア語で「幸運」。運は、待つよりも、迎えに行くもの。","st":"グロッシュラーガーネット","sm":"幸運の星を迎える、淡く澄んだ空色の結晶。"},{"d":245,"n":"Tiaki","c":"つる座","ra":22.7111,"dec":-46.88,"m":2.12,"s":"summer","o":"polynesian","w":"守るという形","msg":"つる座、ニュージーランド・マオリ語で「守護する」。守ること、それが愛のいちばんシンプルな形。","st":"チャロアイト","sm":"守ることは愛だと告げる、淡桃に染まる結晶。"},{"d":246,"n":"Matar","c":"ペガスス座","ra":22.7167,"dec":30.22,"m":2.93,"s":"summer","o":"arabic","w":"必要な時のしるし","msg":"ペガスス座、アラビア語で「降る雨」。望んだ瞬間ではなく、必要な時に降ってくる。","st":"プレナイト","sm":"幸運の雨に、潤いを含む淡い黄緑の灯を。"},{"d":247,"n":"Sadalbari","c":"ペガスス座","ra":22.8333,"dec":24.6,"m":3.51,"s":"autumn","o":"arabic","w":"行き先を持つ備え","msg":"ペガスス座、アラビア語で「鞍を背負う幸運な星」。運ぶものを持つ者は、運ぶ場所を持つ者でもある。","st":"ファイアアゲート","sm":"鞍の幸運に、四角く澄んだ金属の黄金を据える。"},{"d":248,"n":"Shatabhisha","c":"みずがめ座","ra":22.8767,"dec":-7.57,"m":3.75,"s":"autumn","o":"sanskrit","w":"選ぶのは受ける側","msg":"みずがめ座、サンスクリット語で「百人の医師」、ヴェーダの月宿。\n癒す者は百人いてもいい。\n受ける者は、自分を選べばいい。","st":"エジリン","sm":"百人の医者に、空色の結晶がそそぐ静かな癒し。"},{"d":249,"n":"Skat","c":"みずがめ座","ra":22.9108,"dec":-15.82,"m":3.27,"s":"autumn","o":"arabic","w":"立つ場所","msg":"みずがめ座、アラビア語で「脛」。立つ場所があれば、何度でも立ち上がれる。","st":"シンハライト","sm":"水を運ぶ脚に、透きとおる青の結晶を宿す。"},{"d":250,"n":"Fomalhaut","c":"みなみのうお座","ra":22.9606,"dec":-29.62,"m":1.23,"s":"autumn","o":"arabic","w":"群れずに輝く者","msg":"周りに大きな星がない、ぽつんと光る一等星。群れずに輝けるのは才能だ。","st":"モハベジャスパー","sm":"孤独の魚にそう、半透明にやわらぐ白い光。"},{"d":251,"n":"Alfarasalkamil","c":"アンドロメダ座","ra":23.0319,"dec":42.32,"m":3.64,"s":"autumn","o":"arabic","w":"描き足される全体","msg":"アンドロメダ座、アラビア語で「完全な馬」、半身の馬ペガススへの対比。\n一部しか見えなくても、人は全体を思い描ける。","st":"グレープカルセドニー","sm":"完全な馬に宿る、欠けのない青緑のひとかたまり。"},{"d":252,"n":"Scheat","c":"ペガスス座","ra":23.0628,"dec":28.07,"m":2.48,"s":"autumn","o":"arabic","w":"飛ぶための足","msg":"ペガスス座、アラビア語で「脛」。地に立つ脚があるから、空を翔ぶ翼が活きる。","st":"モンタナアゲート","sm":"地に立つ脚を固める、赤茶と黄の入りまじる縞。"},{"d":253,"n":"Fumalsamakah","c":"うお座","ra":23.0646,"dec":3.82,"m":4.52,"s":"autumn","o":"arabic","w":"取り込みの入り口","msg":"うお座、アラビア語で『魚の口』。\n口は、世界を取り込む入り口。\n何を食べるかが、何になるかを決める。","st":"セージグリーンクォーツ","sm":"魚の口に、水底に揺れる青い月光を添える。"},{"d":254,"n":"Markab","c":"ペガスス座","ra":23.0792,"dec":15.2,"m":2.49,"s":"autumn","o":"arabic","w":"上を支える土台","msg":"ペガスス座、アラビア語で「乗り物」、空飛ぶ馬の鞍。上にあるものを支える役には、誇りがある。","st":"ボルダーオパール","sm":"鞍の星に、旅路を支える淡い青と静かな遊色を。"},{"d":255,"n":"Safina","c":"みずがめ座","ra":23.1572,"dec":-21.17,"m":3.68,"s":"autumn","o":"arabic","w":"結べば見える船","msg":"みずがめ座、アラビア語の星宿で「船」、ディフダとフォーマルハウトを結ぶ古代の船。\n二つの星を結べば、その間に船が見える。","st":"パープルフローライト","sm":"古代の船に、水脈を切り裂く青のひとすじを。"},{"d":256,"n":"Honores","c":"アンドロメダ座","ra":23.2092,"dec":49.4,"m":4.52,"s":"autumn","o":"latin","w":"名は作り手より長く","msg":"アンドロメダ座、ラテン語で「栄誉」、1801年Bode命名の追悼の星座。\n栄誉は、生きている間より、後の世に長く残る。","st":"スーパーセブン","sm":"栄誉という名に宿る、しっとりと深い緑の艶。"},{"d":257,"n":"Salm","c":"ペガスス座","ra":23.344,"dec":23.73,"m":4.58,"s":"autumn","o":"arabic","w":"風から守るもの","msg":"ペガスス座、アラビア語で「革・皮」。まとっているものが、その人を守っている。","st":"オニキス","sm":"まとう革に、黒い地へ散る白い雪のしるし。"},{"d":258,"n":"Alkarab","c":"ペガスス座","ra":23.423,"dec":23.4,"m":4.4,"s":"autumn","o":"arabic","w":"暮らしを支える見えぬ縄","msg":"ペガスス座、アラビア語で「水汲み桶の縄」。\n縄は、汲む者と水を繋ぐ。\n見えない繋ぎが、暮らしを支える。","st":"ランドスケープジャスパー","sm":"見えぬ縄をなぞる、白地に黒い斑をつなぐ模様。"},{"d":259,"n":"Udkadua","c":"アンドロメダ座","ra":23.6261,"dec":46.45,"m":3.86,"s":"autumn","o":"sumerian","w":"嵐を司る者","msg":"アンドロメダ座、シュメール語で「口を開けた嵐の精」、3000年前のバビロニア星座。\n古代の人々が恐れた嵐に、名前を与えて手懐けた。\n名前を呼ぶことは、最初の支配。","st":"ラグーナアゲート","sm":"嵐を司る者に、赤の地に金の砂金が散る石を。"},{"d":260,"n":"Rasalnaqa","c":"アンドロメダ座","ra":23.6356,"dec":43.27,"m":4.29,"s":"autumn","o":"arabic","w":"見る者が宿す姿","msg":"アンドロメダ座、アラビア語で「雌ラクダの頭」。\nプトレマイオスは「アンドロメダの手」と呼んだ。\n見方が変われば、星の物語も変わる。","st":"エレファントスキンジャスパー","sm":"雌ラクダの頭をめぐる、入り乱れて踊る縞の模様。"},{"d":261,"n":"Errai","c":"ケフェウス座","ra":23.6556,"dec":77.62,"m":3.21,"s":"autumn","o":"arabic","w":"回る空の軸","msg":"ケフェウス座、アラビア語で「羊飼い」。夜の羊飼いは、星を数えて時を知る。","st":"アポフィライト","sm":"夜の羊飼いの手に、煙色に透ける守りの石。"},{"d":262,"n":"Kaffalmusalsala","c":"アンドロメダ座","ra":23.6735,"dec":44.33,"m":4.139,"s":"autumn","o":"arabic","w":"鎖の届かぬところ","msg":"アンドロメダ座、アラビア語で『鎖に繋がれた手』、プトレマイオスの『アンドロメダの手』から。\n鎖は、心までは届かない。","st":"チューライト","sm":"鎖につながれた手に脈打つ、赤褐に閃く光の筋。"},{"d":263,"n":"Hydor","c":"くじら座","ra":0.0623,"dec":-17.33,"m":4.483,"s":"autumn","o":"greek","w":"どんな器にもなれるもの","msg":"くじら座、ギリシャ語で「水」、古代の広大な薄い星々の星座名。\n水は、形を持たないから、すべての形になれる。","st":"バリサイト","sm":"水という名に、澄んで黄に冴える結晶を宿す。"},{"d":264,"n":"Alpheratz","c":"アンドロメダ座","ra":0.1397,"dec":29.08,"m":2.06,"s":"autumn","o":"arabic","w":"二つに属するもの","msg":"アンドロメダ座とペガスス座、二つの星座にまたがる稀有な星。\n姫の頭であり、天馬の腰でもある。\n所属を一つに決めなくていい。","st":"コランダム","sm":"王女の頭に、深く濃い藍の気高さを載せる。"},{"d":265,"n":"Caph","c":"カシオペヤ座","ra":0.1528,"dec":59.15,"m":2.28,"s":"autumn","o":"arabic","w":"受けて掴む手のひら","msg":"カシオペヤのWの右端、アラビア語で「手のひら」。誰かの手のひらの上にある幸運も、君が引き寄せたものだ。","st":"ビッグスジャスパー","sm":"手のひらの星に握る、黒褐に鉄を帯びた丸い対の石。"},{"d":266,"n":"Algenib","c":"ペガスス座","ra":0.2206,"dec":15.18,"m":2.84,"s":"autumn","o":"arabic","w":"支える力","msg":"ペガスス座、アラビア語で「脇腹」、本来はペルセウス座 α の名前。\n名前は移動する。\nどこに居るかは、時代とともに変わっていい。","st":"ウォンダーストーン","sm":"翼の馬の側面を支える星に、夜を映す黒青の艶を添える。"},{"d":267,"n":"Ankaa","c":"ほうおう座","ra":0.4381,"dec":-42.3,"m":2.38,"s":"autumn","o":"arabic","w":"終わりを始まりに","msg":"ほうおう座、アラビア語で「伝説の鳥」。\n灰から蘇る鳥は、終わりを始まりに変える。","st":"スネークスキンアゲート","sm":"不死鳥の灰に灯る、褐をおびた深い赤の火。"},{"d":268,"n":"Cexing","c":"カシオペヤ座","ra":0.55,"dec":62.92,"m":4.12,"s":"autumn","o":"chinese","w":"見せて効く一本","msg":"カシオペヤ座、中国名で「鞭」、王良星座の隣の御者の道具。\n鞭は、振るうより見せる方が効く。","st":"イエローアパタイト","sm":"馬の鞭に通す、青くなめらかな黒のひとすじ。"},{"d":269,"n":"Fulu","c":"カシオペヤ座","ra":0.6161,"dec":53.88,"m":3.68,"s":"autumn","o":"chinese","w":"副え道を整える者","msg":"カシオペヤ座、中国名で「副官」、紫宮の副道を司る役人。\n主役の影で道を整える者が、組織を支える。","st":"エンジェルラダークォーツ","sm":"影で道を整える者に似た、黄と褐が割れ目を埋める石。"},{"d":270,"n":"Schedar","c":"カシオペヤ座","ra":0.675,"dec":56.53,"m":2.25,"s":"autumn","o":"arabic","w":"内で育つ光","msg":"王妃カシオペヤの胸。誇りは見せびらかすものじゃない。胸の奥で温め続けたものは、いつか形になって出てくる。","st":"クロムダイオプサイド","sm":"胸に宿る誇りへ、深紅の奥でひそかに光の十字を結ぶ。"},{"d":271,"n":"Diphda","c":"くじら座","ra":0.7264,"dec":-17.98,"m":2.05,"s":"autumn","o":"arabic","w":"大きなものの進み方","msg":"くじら座の尾の星。大きなものほど、ゆっくり動く。焦るな。","st":"ボツワナアゲート","sm":"鯨の尾に沈む、深い水底のような赤褐と黒。"},{"d":272,"n":"Shimu","c":"アンドロメダ座","ra":0.789,"dec":24.27,"m":3.92,"s":"autumn","o":"chinese","w":"見る者が決める獣","msg":"アンドロメダ座、中国の最古の星名「天の豚の眼」。\n古代中国の天空に、天の豚が眠っていた。\n動物の見方は、文化で変わる。","st":"ハックマナイト","sm":"天の豚の眼に、青のこまかなきらめきを宿す。"},{"d":273,"n":"Achird","c":"カシオペヤ座","ra":0.8181,"dec":57.8,"m":3.46,"s":"autumn","o":"contemporary","w":"名より古い光","msg":"カシオペヤ座、20世紀に新たに命名された星。\n今になって名前を持つ星にも、千年の光が宿る。","st":"ダイオプサイド","sm":"千年の光をたたえる、淡く澄んだ緑の刃。"},{"d":274,"n":"Castula","c":"カシオペヤ座","ra":0.9444,"dec":59.17,"m":4.62,"s":"autumn","o":"latin","w":"まとう生き方","msg":"カシオペヤ座、ラテン語で「婦人服」、Bayer 1603命名。\n服は、その人の姿勢を作る。\n選ぶ服は、選ぶ生き方だ。","st":"ローズクォーツ","sm":"選ぶ服が生き方になる、やわらかく澄んだ若草の緑。"},{"d":275,"n":"Tiansi","c":"カシオペヤ座","ra":0.945,"dec":60.72,"m":2.18,"s":"autumn","o":"chinese","w":"揃って進む四頭","msg":"カシオペヤ座、中国名で「天の駟」、2000年以上前の星宿。\n四頭の馬は、揃って同じ方向に進む。\nチームとは、揃うこと。","st":"セプタークォーツ","sm":"天の四頭立て馬車に、白い石の中へ枝分かれする黒いしるし。"},{"d":276,"n":"Kui","c":"アンドロメダ座","ra":0.9534,"dec":23.42,"m":4.403,"s":"autumn","o":"chinese","w":"受け継がれる座","msg":"アンドロメダ座、中国の二十八宿のひとつ「脚」。\n古代中国の時代に、ζ Andが代表星だった。\n時代と共に、代表は変わる。","st":"コモンオパール","sm":"奎宿の脚に宿る、黒の中にゆらめく銀の輪。"},{"d":277,"n":"Wurren","c":"ほうおう座","ra":1.1397,"dec":-55.23,"m":3.9,"s":"autumn","o":"aboriginal","w":"守られて継ぐもの","msg":"ほうおう座、豪州ワダマン族の言葉で「子供」、生命を司るカエル女神の子。\n命の継承者には、必ず守り手がいる。","st":"ダイアスポア","sm":"小さき魚を守る、いのちを継ぐ深い緑の柱。"},{"d":278,"n":"Tarandus","c":"ケフェウス座","ra":1.1458,"dec":86.25,"m":4.244,"s":"autumn","o":"latin","w":"どこにでもある自分の座","msg":"ケフェウス座、ラテン語化された『トナカイ』、近代ヨーロッパで定められた名。\nどこに生まれても、空には自分の場所がある。","st":"ゴールデンヒーラークォーツ","sm":"雪原をゆく獣に灯る、赤と黄に焼けた大地の温もり。"},{" る場所。\n融通の効く場所が、構造を支える。","st":"ブルームーンストーン","sm":"二つの関節をつなぐ、四角く澄んだ金色の芯。"},{"d":298,"n":"Apdu","c":"さんかく座","ra":2.2886,"dec":33.83,"m":4.01,"s":"autumn","o":"egyptian","w":"揺れながら生きた名","msg":"さんかく座、エジプト語で「鳥」、紀元前2千年紀の古代星座。\n21種類の綴り違いを千年超えて受け継いだ名。\n古い言葉ほど、形が揺れる。","st":"ベラクルスアメジスト","sm":"古鳥の記憶に宿る、淡い緑をおびた琥珀色の粒。"},{"d":299,"n":"Mira","c":"くじら座","ra":2.3224,"dec":-2.97,"m":2.0,"s":"autumn","o":"latin","w":"見るたび違う姿","msg":"くじら座、ラテン語で「驚異」、ヘヴェリウスが「驚異の星の小史」と書いた変光星。\n見るたびに変わる星もある。\n変化は、退屈じゃなく驚きだ。","st":"ブラックムーンストーン","sm":"驚異を宿し脈打つ、深い赤の大地。"},{"d":300,"n":"Huagai","c":"カシオペヤ座","ra":2.4844,"dec":67.4,"m":4.5,"s":"autumn","o":"chinese","w":"誰を入れるかを選ぶ覆い","msg":"カシオペヤ座、中国名で「皇帝の天蓋」、十六星から成る古代星座。\n上に被さるものは、その下にいる者を選ぶ。","st":"キアストライト","sm":"皇帝の天蓋を彩る、澄んだ黄金のひと粒。"},{"d":301,"n":"Polaris","c":"こぐま座","ra":2.5297,"dec":89.25,"m":2.0,"s":"autumn","o":"latin","w":"変わらぬ道しるべ","msg":"天の北極にいる、迷う夜の道しるべ。誰かに「あなたがいたから道がわかった」と言わせる星に。","st":"ゼブラジャスパー","sm":"動かぬ星に応える、ゆるがぬ金の輝き。"},{"d":302,"n":"Kaffaljidhma","c":"くじら座","ra":2.7217,"dec":3.23,"m":3.57,"s":"autumn","o":"arabic","w":"刻んだ名","msg":"くじら座、アラビア語で「短き手」、くじらの頭の星宿。\n失ったものを名にすることで、覚えていられる。","st":"ラベンダージェード","sm":"失ったものを記す、透明な水晶の内にとどまる影の山。"},{"d":303,"n":"Lilii Borea","c":"おひつじ座","ra":2.7985,"dec":29.23,"m":4.514,"s":"autumn","o":"latin","w":"静かな強さ","msg":"おひつじ座、近代命名でラテン語「北の百合」。古い名前を上書きする勇気もある。","st":"ファイアオパール","sm":"北に咲く百合のような、淡く揺れる白光。"},{"d":304,"n":"Bharani","c":"おひつじ座","ra":2.8331,"dec":27.25,"m":3.59,"s":"autumn","o":"sanskrit","w":"荷を知る受け手","msg":"おひつじ座、サンスクリット語で「運ぶ者」、ヴェーダの第二の月宿。\n運ぶ者は、自分が運んでいるものを知っている。","st":"ホワイトムーンストーン","sm":"運ぶ者に添う、白い石の奥で虹色に閃く遊色。"},{"d":305,"n":"Miram","c":"ペルセウス座","ra":2.8447,"dec":55.88,"m":3.76,"s":"autumn","o":"arabic","w":"受け継がれた誤り","msg":"ペルセウス座、アラビア語の「手首」の誤記の可能性。\n誤記すらも、千年経てば本物の名前になる。","st":"カーネリアン","sm":"誤りごと包み直す、暗く深い赤紫のひと粒。"},{"d":306,"n":"Angetenar","c":"エリダヌス座","ra":2.8506,"dec":-21.0,"m":4.78,"s":"autumn","o":"arabic","w":"遠回りする流れ","msg":"エリダヌス座、アラビア語で「川の蛇行」。\n曲がった川は、まっすぐな川より長く流れる。","st":"スターサンストーン","sm":"川の曲がりに溜まる、金属の艶 波を立て船乗りを網で捕える。\n海の母は、優しさと容赦のなさを併せ持つ。","st":"スタウロライト","sm":"海神の懐に脈打つ、濃いばら色をたたえた石。"},{"d":317,"n":"Sarvvis","c":"ペルセウス座","ra":3.7153,"dec":47.78,"m":3.02,"s":"autumn","o":"sami","w":"寒さが育てる角","msg":"ペルセウス座、サーミ族の星座、北スカンジナビアの先住民の伝統。\n極北を生きる獣のように、寒さの中でこそ角は伸びる。","st":"ピンクカルセドニー","sm":"極北を生きる獣に冴える、澄んだ水色の透明。"},{"d":318,"n":"Rana","c":"エリダヌス座","ra":3.7206,"dec":-9.75,"m":3.53,"s":"autumn","o":"latin","w":"跳んで変わる景色","msg":"エリダヌス座、ラテン語で「蛙」。小さく地を跳ねる者にも、星の場所がある。","st":"オレゴンサンストーン","sm":"小さく地を跳ねる蛙に灯る、橙にきらめく実りの粒。"},{"d":319,"n":"Atik","c":"ペルセウス座","ra":3.7386,"dec":32.28,"m":3.91,"s":"autumn","o":"arabic","w":"ゆるめる強さ","msg":"ペルセウス座、アラビア語で「肩」。肩の力を抜くことを、覚えていろ。","st":"オレンジカイヤナイト","sm":"肩に添う、青白くやわらいだ静けさ。"},{"d":320,"n":"Electra","c":"おうし座","ra":3.7478,"dec":24.1,"m":3.71,"s":"autumn","o":"greek","w":"積み重ねた時間の光","msg":"プレアデスの一星、ギリシャ語で「輝く」。輝きは、磨いた時間の累積。","st":"アニョライト","sm":"琥珀の名を持つ星に冴える、淡い青の縞模様。"},{"d":321,"n":"Taygeta","c":"おうし座","ra":3.7535,"dec":24.47,"m":4.3,"s":"autumn","o":"greek","w":"上げた目に開く高み","msg":"プレアデスの星、ギリシャ神話のニンフ。高みは、登った者にだけ見える景色を見せる。","st":"ホワイトトパーズ","sm":"山の女神に降りる、こまかな煌めきを秘めた青。"},{"d":322,"n":"Maia","c":"おうし座","ra":3.7636,"dec":24.37,"m":3.86,"s":"autumn","o":"greek","w":"芽吹きを止めぬ者","msg":"プレアデスの星、ローマの五月の名の由来。芽吹きを止めるな。","st":"グリーンファントムクォーツ","sm":"五月の女神をつつむ、羽根のような銀緑の縞。"},{"d":323,"n":"Merope","c":"おうし座","ra":3.7721,"dec":23.93,"m":4.18,"s":"autumn","o":"greek","w":"ひそかに咲く一輪","msg":"プレアデスで一番暗い星、人間に嫁いだ姉妹。隠れて咲く花にも価値はある。","st":"スミソナイト","sm":"隠された者に揺れる、淡く青い遊色。"},{"d":324,"n":"Alcyone","c":"おうし座","ra":3.7914,"dec":24.1,"m":2.88,"s":"autumn","o":"greek","w":"凪の日々","msg":"すばるの中心、ギリシャ神話の海の精。姉妹で在りながら、自分の名を持て。","st":"ラリマー","sm":"凪いだ海面に円を描く、青緑のやわらかなさざ波。"},{"d":325,"n":"Atlas","c":"おうし座","ra":3.8192,"dec":24.05,"m":3.61,"s":"autumn","o":"greek","w":"重い連れを支える者","msg":"プレアデスの父、天空を背負った巨人。重荷は、それを持てる者にだけ来る。","st":"マンダリンガーネット","sm":"天を支える者に据わる、深く濃い藍青の芯。"},{"d":326,"n":"Pleione","c":"おうし座","ra":3.8198,"dec":24.13,"m":4.77,"s":"autumn","o":"greek","w":"群れの名に残る者","msg":"プレアデスの母、ニンフ。育てた者は、いつまでもそこにいる。","st":"モスカルセドニー","sm":"母の星をつつむ、空のように淡い青の結晶。"},{"d":327,"n":"Custos","c":"きりん座","ra":3.8254,"dec":65.52,"m":4.39,"s":"autumn","o":"latin","w":"役の舞台より残る名","msg":"きりん座、ラテン語で「収穫の番人」、Lalandeが付けた星座名。\n見守る者の名は、自分の名より長く残る。","st":"デュモルタイト","sm":"収穫を見守る番人に添う、やわらかく淡い緑。"},{"d":328,"n":"Shaowei","c":"きりん座","ra":3.8393,"dec":71.32,"m":4.66,"s":"autumn","o":"chinese","w":"壁を欠かさぬ二番手","msg":"きりん座、中国名で「第二の衛兵」、紫宮の右壁の六番目の星。\n二番手が中心を支える。","st":"プシロメラン","sm":"中心を支える副の衛兵に、蜜色をおびた橙の粒。"},{"d":329,"n":"Áldu","c":"ペルセウス座","ra":3.9642,"dec":40.0,"m":2.91,"s":"autumn","o":"sami","w":"冬を率いる母","msg":"ペルセウス座、サーミ語で「雌のトナカイ」。\n冬も角を残す雌トナカイは、母性と力強さを兼ね備える。","st":"チャート","sm":"母性と力をあわせ持つ雌獣に、金粉を散らす濃い青。"},{"d":330,"n":"Zaurak","c":"エリダヌス座","ra":3.9669,"dec":-13.5,"m":2.96,"s":"autumn","o":"arabic","w":"流れに委ねる舟","msg":"エリダヌス座、アラビア語で「小舟」、エリダヌス川を下る。川の流れに任せる勇気もある。","st":"ルベライト","sm":"小舟を染める、褐をおびた深い赤。"},{"d":331,"n":"Menkib","c":"ペルセウス座","ra":3.9828,"dec":35.78,"m":4.04,"s":"autumn","o":"arabic","w":"行く先を照らす","msg":"ペルセウス座、アラビア語で「プレアデスの肩」、星団の隣に位置する星。\n隣にあることで、地名になる星がある。","st":"バサルト","sm":"行く先を照らして駆ける星に添う、青緑のやわらかな光。"},{"d":332,"n":"Beid","c":"エリダヌス座","ra":4.1978,"dec":-6.83,"m":4.0,"s":"autumn","o":"arabic","w":"ひらかれた未来","msg":"エリダヌス座、アラビア語で「卵たち」、ダチョウの巣の周りの星々。\n卵は、まだ何になるかわからない可能性。","st":"グリーンアパタイト","sm":"卵のような丸みを宿す、ぬくもりのある不透明な黄。"},{"d":333,"n":"Rhombus","c":"レチクル座","ra":4.2403,"dec":-62.47,"m":3.33,"s":"autumn","o":"latin","w":"やわらかさが持つ対角線","msg":"レチクル座、ラテン語で「菱形」、Habrechtが1621年に定義した星座。\n四角形より柔らかい菱形は、対角線を持つ。","st":"ピーチムーンストーン","sm":"菱形にひかりを宿す、乳白にやわらぐ白の結晶。"},{"d":334,"n":"Keid","c":"エリダヌス座","ra":4.2545,"dec":-7.65,"m":4.43,"s":"autumn","o":"arabic","w":"生まれ出たあとの抜け殻","msg":"エリダヌス座、アラビア語で「卵の殻」、ダチョウの巣の周りの星宿。\n殻を破る瞬間が、いちばん怖くて、いちばん輝く。","st":"ゾイサイト","sm":"殻を破る瞬間のように、おだやかに張りつめた黄の翡翠。"},{"d":335,"n":"Prima Hyadum","c":"おうし座","ra":4.3297,"dec":15.62,"m":3.65,"s":"autumn","o":"latin","w":"先頭で知る兆し","msg":"おうし座、ラテン語で「ヒアデスの最初の星」。群れの先頭は、誰よりも早く雨に濡れる。","st":"グランディディエライト","sm":"ヒアデスの先頭に灯る、軽やかに澄んだ黄の結晶。"},{"d":336,"n":"Secunda Hyadum","c":"おうし座","ra":4.3822,"dec":17.53,"m":3.76,"s":"autumn","o":"latin","w":"手本を見て歩む者","msg":"おうし座、ラテン語で「ヒアデスの二の星」。二番手は、一番を見ながら歩める。","st":"フリント","sm":"二番目に続く、明るく澄んだ黄の透明。"},{"d":337,"n":"Beemim","c":"エリダヌス座","ra":4.4006,"dec":-34.02,"m":3.96,"s":"autumn","o":"latin","w":"地を蹴る力","msg":"エリダヌス座、ラテン語で『左の後ろ脚』。\n地を蹴る脚があるから、体は前へ運ばれる。","st":"ヘソナイトガーネット","sm":"地を蹴る後ろ脚に、透明の中へ重なる成長のしるし。"},{"d":338,"n":"Ain","c":"おうし座","ra":4.4769,"dec":19.17,"m":3.53,"s":"autumn","o":"arabic","w":"奥行きを生む二つ目","msg":"おうし座、アラビア語で「雄牛の眼」の略、もともとは α Tau の名前。\nアルデバランの隣で、もう一つの眼として輝く。\n二つの眼で世界を立体に見る。","st":"クレイジーレースアゲート","sm":"もう一つの眼に灯る、まろやかに澄んだ橙の光。"},{"d":339,"n":"Chamukuy","c":"おうし座","ra":4.4775,"dec":15.87,"m":3.39,"s":"autumn","o":"maya","w":"大きな物語に埋もれぬ声","msg":"おうし座、マヤ語で「小鳥」。小さな声にも、神々が耳を傾ける。","st":"フラワーアゲート","sm":"マヤの小鳥にそっと添う、淡くやわらかな黄の灯。"},{"d":340,"n":"Theemin","c":"エリダヌス座","ra":4.5922,"dec":-30.55,"m":3.81,"s":"autumn","o":"arabic","w":"しんがり","msg":"エリダヌス座、アラビア語で「最後の」。いちばん後ろを歩く者は、誰も置き去りにしない。","st":"ヒデナイト","sm":"最後尾に灯る、しずかな蜜色のひかり。"},{"d":341,"n":"Aldebaran","c":"おうし座","ra":4.5986,"dec":16.5,"m":0.99,"s":"autumn","o":"arabic","w":"逸らさぬまなざし","msg":"赤くまっすぐ見据える、おうし座の眼。逸らさないことが、勇気だ。","st":"アルマンディンガーネット","sm":"雄牛の眼のように燃える、深紅に十字の光を宿す石。"},{"d":342,"n":"Sceptrum","c":"エリダヌス座","ra":4.6361,"dec":-14.3,"m":3.9,"s":"autumn","o":"latin","w":"在ることが示す権威","msg":"エリダヌス座、ラテン語で「笏」。権威の象徴は、振らないからこそ意味を持つ。","st":"ロードライトガーネット","sm":"王笏を飾る、橙のうねる炎の縞。"},{"d":343,"n":"Gaja","c":"おうし座","ra":4.7041,"dec":22.95,"m":4.27,"s":"autumn","o":"sanskrit","w":"慎重な歩み","msg":"おうし座、サンスクリット語で「象」、インドネシア・バリの1300年続く星暦から。\n大きな獣は、ゆっくり動く。\n動きが遅いのは、慎重さの証だ。","st":"クレイジーホースアゲート","sm":"象の歩みを支える、ゆるやかに澄んだ黄金の核。"},{"d":344,"n":"Tabit","c":"オリオン座","ra":4.8306,"dec":6.95,"m":3.18,"s":"winter","o":"arabic","w":"静かに保ち続ける者","msg":"オリオン座、アラビア語で「不変なる者・耐える者」。\nオリオンの盾を構成する一星、変わらないことが力。\n動かないでいる強さも、ある。","st":"アンダリュサイト","sm":"動かぬ強さに秘めた、黒い地から閃く青と金の遊色。"},{"d":345,"n":"Hassaleh","c":"ぎょしゃ座","ra":4.9497,"dec":33.15,"m":2.66,"s":"winter","o":"arabic","w":"立ち上がる原点","msg":"ぎょしゃ座、アラビア語で「かかと」。地に着く場所が、立ち上がる原点になる。","st":"フェアバーンアゲート","sm":"かかとを支える、夕陽を閉じこめた金褐のあたたかさ。"},{"d":346,"n":"Almaaz","c":"ぎょしゃ座","ra":5.0328,"dec":43.82,"m":3.03,"s":"winter","o":"arabic","w":"連れと組んで在るもの","msg":"ぎょしゃ座、アラビア語で「山羊」、母なるカペラと対をなす雄。\n対を成すために、別々の名がいる。","st":"カリフォルナイト","sm":"雄山羊に添う、淡く澄んだ黄緑のひかり。"},{"d":347,"n":"Saclateni","c":"ぎょしゃ座","ra":5.0411,"dec":41.07,"m":3.77,"s":"winter","o":"latin","w":"二番目の物語","msg":"ぎょしゃ座、アラビア語で「二頭目の子山羊」。二番目の者にも、自分の物語がある。","st":"ユーディアライト","sm":"小山羊によりそう、黄金に流れる艶やかな縞。"},{"d":348,"n":"Ping","c":"うさぎ座","ra":5.0908,"dec":-22.37,"m":3.17,"s":"winter","o":"chinese","w":"人目を遮るささやかさ","msg":"うさぎ座、中国名で「便所の前の屏風」。\n隠す装置にも、夜空に名前がある。\nプライバシーを守る道具を、軽んじるな。","st":"スパイダーウェブジャスパー","sm":"屏風のように立つ、白くなめらかな石肌。"},{"d":349,"n":"Haedus","c":"ぎょしゃ座","ra":5.1083,"dec":41.23,"m":3.17,"s":"winter","o":"latin","w":"守られる小さき座","msg":"ぎょしゃ座、ラテン語で「子山羊」、御者の左手首の二つの星のひとつ。\n親に守られる小さき者にも、空に居場所がある。","st":"ジンサイト","sm":"御者の子に冴える、青く澄んだ透明。"},{"d":350,"n":"Cursa","c":"エリダヌス座","ra":5.1308,"dec":-5.08,"m":2.79,"s":"winter","o":"arabic","w":"立つ時を選べる座","msg":"エリダヌス座、アラビア語で「玉座」。座る場所を持つ者は、立ち上がる時を選べる。","st":"アパッチティアーズ","sm":"王の玉座にやどる、両端のとがった無色透明の水晶。"},{"d":351,"n":"Bade","c":"うさぎ座","ra":5.2153,"dec":-16.2,"m":3.29,"s":"winter","o":"balinese","w":"丁寧な見送り","msg":"うさぎ座、バリ語で「火葬塔」、太平洋の星座。\n別れを送る塔の名が、星に刻まれた。\n見送る場所を、丁寧に作れ。","st":"グリーンオパール","sm":"葬送の塔に積まれた、別れを見送る艶やかな黒。"},{"d":352,"n":"Rigel","c":"オリオン座","ra":5.2422,"dec":-8.2,"m":0.28,"s":"winter","o":"arabic","w":"青の覇者","msg":"オリオンの足元で誰よりも青く燃える。派手じゃなくていい。深い色を持て。","st":"レムリアンシード","sm":"青の覇者にふさわしい、深く落ち着いた空色の石。"},{"d":353,"n":"Capella","c":"ぎょしゃ座","ra":5.2781,"dec":45.98,"m":0.08,"s":"winter","o":"latin","w":"対等にめぐる光","msg":"二つの太陽が回る冬の星。誰かを支える人にこそ、自分への光を。","st":"グァバクォーツ","sm":"母なる御者をつつむ、透明に金の針を秘めた光。"},{"d":354,"n":"Bellatrix","c":"オリオン座","ra":5.4186,"dec":6.33,"m":1.66,"s":"winter","o":"latin","w":"昨日の自分を越える者","msg":"オリオンの肩で青白く輝く。戦う相手は、外じゃなくて昨日の自分。","st":"スノーフレークオブシディアン","sm":"昨日の自分と戦う女戦士に、淡くにごる青緑の冴え。"},{"d":355,"n":"Elnath","c":"おうし座","ra":5 function dayOfYear(date) {
  // Calendar is built on leap-year basis (366 entries). Always use leap-year month days
  // so May 7 always maps to day 128, regardless of whether the year is leap or not.
  const m = date.getMonth();
  const d = date.getDate();
  const monthDays = [31, 29, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
  let total = d;
  for (let i = 0; i < m; i++) total += monthDays[i];
  return total;
}

function findStarForDate(date) {
  let d = dayOfYear(date);
  if (d < 1) d = 1;
  if (d > 366) d = 366;
  return STARS[d - 1];
}

function angularDist(ra1, ra2) {
  let diff = Math.abs(ra1 - ra2);
  return Math.min(diff, 24 - diff);
}

function formatDate(d) {
  return d.getFullYear() + "年 " + (d.getMonth()+1) + "月 " + d.getDate() + "日";
}

function aspectFromRA(s1, s2) {
  const dist = angularDist(s1.ra, s2.ra);
  const angle = dist * 15;
  if (angle < 8)  return { name:'合', en:'Conjunction', score:90, msg:'重なり合う運命。ほぼ同じ位置に瞬く二つの星。' };
  if (angle < 22) return { name:'準合', en:'Semi-Conjunction', score:75, msg:'近くに並んで光る、空気のような関係。' };
  if (angle < 38) return { name:'六分', en:'Sextile', score:85, msg:'軽やかに共鳴する。自然と心地よい距離感。' };
  if (angle < 52) return { name:'準矩', en:'Semi-Square', score:65, msg:'微妙に噛み合わない、けれど刺激的な関係。' };
  if (angle < 68) return { name:'矩', en:'Square', score:70, msg:'ぶつかって磨かれる。衝突を恐れず議論できれば最強。' };
  if (angle < 82) return { name:'準三分', en:'Quincunx', score:73, msg:'視線が交わらない。距離をとった方が長続きする。' };
  if (angle < 98) return { name:'三分', en:'Trine', score:92, msg:'流れの良い調和。努力なしで自然に合う相性。' };
  if (angle < 112) return { name:'準衝', en:'Sesquiquadrate', score:74, msg:'引き合いつつ反発する、不思議な縁。' };
  if (angle < 128) return { name:'五分', en:'Quintile', score:80, msg:'創造的な刺激を与え合う。一緒にいると新しい何かが生まれる。' };
  if (angle < 142) return { name:'準衝', en:'Inconjunct', score:68, msg:'噛み合わない部分を、面白がれるかどうか。' };
  if (angle < 158) return { name:'三半', en:'Biquintile', score:82, msg:'独立した二つの光が、互いを照らし合う関係。' };
  return { name:'衝', en:'Opposition', score:88, msg:'夜空の対極。反発するからこそ強く惹かれる、鏡映しの関係。' };
}

function seasonAxis(s1, s2) {
  if (s1.season === s2.season) {
    return { score:5, msg:'同じ季節の星。同じ夜空に二人で見上げられる。' };
  }
  const opp = { spring:'autumn', autumn:'spring', summer:'winter', winter:'summer' };
  if (opp[s1.season] === s2.season) {
    return { score:0, msg:'反対の季節。半年待って再び会える、すれ違いの星。' };
  }
  return { score:2, msg:'季節は違うが、夜空の隣同士。少しタイミングをずらして響き合う。' };
}

function hemiAxis(s1, s2) {
  const n1 = s1.dec >= 0, n2 = s2.dec >= 0;
  if (n1 && n2)  return { score:3, msg:'ともに北天の星。同じ視線の先に灯る光。' };
  if (!n1 && !n2) return { score:3, msg:'ともに南天の星。同じ南国の夜を共にする。' };
  return { score:0, msg:'北天と南天。地球を半周して届く想い。' };
}

function originAxis(s1, s2) {
  if (s1.origin === s2.origin) {
    return { score:4, msg:'同じ文化に由来する名。語り継がれてきた言葉が同じ。' };
  }
  return { score:2, msg:'異なる文化の出会い。違う言葉で呼ばれてきた光が、ここで重なる。' };
}

function constellationAxis(s1, s2) {
  if (s1.c === s2.c) {
    return { score:5, msg:'同じ星座の中に並ぶ二人。ひとつの物語の中で、隣同士の星。' };
  }
  return { score:0, msg:'違う星座の星。それぞれの場所で、それぞれの物語を持つ。' };
}

function calcCompat(s1, s2) {
  if (s1.day === s2.day) {
    return {
      score:99, label:'鏡映し', axes:[],
      msg:'同じ日の同じ星に守られた二人。あまりに似ていて、たまにぶつかる。'
    };
  }
  const a1 = aspectFromRA(s1, s2);
  const a2 = seasonAxis(s1, s2);
  const a3 = hemiAxis(s1, s2);
  const a4 = originAxis(s1, s2);
  const a5 = constellationAxis(s1, s2);
  const score = Math.min(99, a1.score + a2.score + a3.score + a4.score + a5.score);
  return {
    score, label:a1.name,
    axes:[
      { label:'角度', en:a1.en, msg:a1.msg },
      { label:'季節', msg:a2.msg },
      { label:'半球', msg:a3.msg },
      { label:'文化', msg:a4.msg },
      { label:'星座', msg:a5.msg },
    ],
    msg:''
  };
}

function shareS(name, word, stone) {
  const s = STARS.find(x => x.name === name);
  let quote = word;
  if (s && s.msg) {
    const sentences = s.msg.replace(/\n/g, '').split('。').filter(t => t.trim().length > 0);
    if (sentences.length > 0) quote = sentences[sentences.length - 1].trim();
  }
  const text = '「' + quote + '」\n── 私の星、' + name + '（' + word + '）\n\nあなたの夜空の言葉は？\nhttps://yourstar.jp #365日の星';
  window.open("https://twitter.com/intent/tweet?text=" + encodeURIComponent(text), "_blank");
}

かと一緒に何かを作る／決める／始める。"}, {"n": "オメガ星団", "w": "南の大集会", "r": "大吉", "body": "今日は大きな場に出る日。普段より広いコミュニティ、人が多い場所、自分の世界の外に出ると吉。", "note": "気をつけたいのは、ひと声に圧倒されないこと、自分は自分のまま。", "act": "いつもより人の多い場所にあえて行く。"}, {"n": "ペルセウス二重星団", "w": "対の輝き", "r": "大吉", "body": "今日はパートナーシップの日。誰かと組むことで、ひとりでは出せない光が出る。恋愛、仕事、家族 ── 「対」が大事。", "note": "気をつけたいのは、相手任せにしないこと、対は自分も光るからこそ。", "act": "自分が組んでいる相手に、何かひとつ返してみる。"}, {"n": "ソンブレロ銀河", "w": "銀の輪を被る", "r": "中吉", "body": "今日は気品ある日。装い、所作、言葉づかい ── 少し丁寧にすると、流れがよくなる。背筋を伸ばしたほうが運が来る。", "note": "気をつけたいのは、堅苦しくなりすぎないこと。", "act": "いつもより少しいい服を選ぶ、または姿勢を意識する。"}, {"n": "子持ち銀河", "w": "寄り添う渦", "r": "大吉", "body": "今日は寄り添いの日。誰かを守る、または誰かに守られる ── 親子、年下、後輩、ペットなどの関係が今日のキー。", "note": "気をつけたいのは、過保護になりすぎないこと。", "act": "年下の誰か、後輩、家族に手をかける。"}, {"n": "三角座銀河", "w": "三角に住まう渦", "r": "吉", "body": "今日は三つで回す日。一つでも二つでもない、三つの要素を抱えると動きが出る。家庭・仕事・自分、または三人での話し合い。", "note": "気をつけたいのは、どれかを切らないこと、三つ揃ってこそ回る。", "act": "違う方向の3つを、今日まとめてやってみる。"}, {"n": "銀河系中心", "w": "銀河の沈黙の核", "r": "大凶", "body": "今日は手放す日。引き止めようとしていたものが、するりと手から離れていく。抵抗せず見送ることで、後の風通しがよくなる。", "note": "気をつけたいのは、失った気持ちに飲まれすぎないこと、それは終わりではなく流れ。", "act": "今日は新しいことを始めず、静かに過ごす。"}, {"n": "M87ブラックホール", "w": "初めて姿を見せた闇", "r": "凶", "body": "今日は避けてきたものと向き合う日。気づかないふりをしてきたこと、見たくなかった現実が、ふと姿を現す。「見る」ことが明日の出発点に。", "note": "気をつけたいのは、向き合おうとして自分を責めすぎないこと。気づくことと今すぐ解決することは別。", "act": "見たくなかったものを、目で確認する。中身を読まなくていい、開くだけでいい。"}, {"n": "SN1987A", "w": "我らが見た閃光", "r": "凶", "body": "今日は強い印象を受ける日。誰かの姿、出来事、ひとつの言葉が、強烈に心に焼き付く。終わりの予感を含んでいることもある。", "note": "気をつけたいのは、印象に振り回されすぎないこと、見届けたことに価値がある。", "act": "今日見た／聞いた言葉のひとつをメモする。"}];
const RANK_CLASS = {'大吉':'daikichi','中吉':'chukichi','吉':'kichi','小吉':'shokichi','末吉':'suekichi','凶':'kyo','大凶':'daikyo'};
function showFortune(){
  const todayKey = (new Date()).toDateString();
  const stored = JSON.parse(localStorage.getItem('fortune_today') || '{}');
  let count = (stored.date === todayKey) ? (stored.count || 0) : 0;
  let lastIdx = (stored.date === todayKey) ? stored.lastIdx : null;
  let idx, isReplay = false;
  if (count >= 3) {
    idx = lastIdx;
    isReplay = true;
  } else {
    idx = Math.floor(Math.random() * FORTUNE_43.length);
    count++;
    localStorage.setItem('fortune_today', JSON.stringify({date: todayKey, count: count, lastIdx: idx}));
  }
  const card = FORTUNE_43[idx];
  const today = new Date();
  const dateStr = (today.getMonth()+1) + '月' + today.getDate() + '日';
  let countLabel;
  if (isReplay) countLabel = '今日はもう引けません';
  else if (count === 3) countLabel = '3回目 ── 最終';
  else countLabel = count + '回目 ／ 3回まで';
  // ローディング
  const msgs = ['今夜の星に、問いかけています…','夜空のリズムに耳を傾けています…','今日のあなたに、星が語りかけてくれます…','宇宙の片隅から、言葉を呼んでいます…','今日の運勢を、星空から受け取ります…'];
  const loadMsg = msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById('fortune-content').innerHTML =
    '<div class="loading-state" style="padding:2rem 0;text-align:center;">' +
      '<div class="loading-pulse">✦</div>' +
      '<div class="loading-text">' + loadMsg + '</div>' +
    '</div>';
  document.getElementById('fortune-bg').classList.add('show');
  setTimeout(function(){
    document.getElementById('fortune-content').innerHTML =
      '<div style="text-align:center;">' +
        '<div class="fortune-date">' + dateStr + '</div>' +
        '<div class="fortune-name">' + card.n + '</div>' +
        '<div class="fortune-word">「' + card.w + '」</div>' +
      '</div>' +
      '<div class="fortune-body">' + card.body + '</div>' +
      '<div class="fortune-note">' + card.note + '</div>' +
      '<div class="fortune-action">' +
        '<div class="fortune-action-label">ラッキーアクション</div>' +
        '<div class="fortune-action-text">' + card.act + '</div>' +
      '</div>' +
      '<div class="fortune-count">' + countLabel + '</div>';
  }, 1400);
}
function closeFortune(){ document.getElementById('fortune-bg').classList.remove('show'); }
